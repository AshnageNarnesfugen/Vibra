name: Release APK

# Se dispara al empujar un tag `v*` (ej: `git tag v1.0.9 && git push --tags`).
# Compila el APK release y crea un GitHub Release con el APK adjunto.
#
# Ejecución manual también disponible desde la pestaña Actions
# (workflow_dispatch) por si querés generar un build sin tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag de versión (ej: v1.0.9). Solo para el nombre del release manual.'
        required: false
        default: 'manual'

# Permiso de escritura de contenidos para poder crear el Release.
permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 — AGP/Kotlin no compilan con JDK 26; 21 es el soportado
      # por la última AGP estable. setup-java setea JAVA_HOME, que Gradle
      # usa (no dependemos del org.gradle.java.home local del dev).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (no bloquea el release, solo reporta)
        run: flutter analyze || true

      # Keystore de release estable (secret KEYSTORE_BASE64). Sin esto,
      # cada runner firmaba con una llave debug recién generada → cada
      # release tenía firma distinta → Android rechazaba actualizar
      # ("conflicto de paquetes") y obligaba a desinstalar. Con la misma
      # llave en todos los builds, los updates instalan encima.
      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/vibra-release.jks"

      # Build por ABI: 3 APKs de ~25MB en lugar del universal de 65MB —
      # el usuario descarga solo el de su arquitectura (arm64-v8a para
      # prácticamente cualquier teléfono de 2017+). El build.gradle.kts
      # renombra cada uno a Vibra-<version>-<abi>.apk.
      - name: Build release APKs (split por ABI)
        env:
          VIBRA_KEYSTORE_PATH: ${{ runner.temp }}/vibra-release.jks
          VIBRA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VIBRA_KEY_ALIAS: vibra
          VIBRA_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      # Localiza los APKs con nombre de marca. Fallback a los app-*.apk
      # por si el rename fallara.
      - name: Locate APKs
        id: apk
        run: |
          APKS=$(find build/app/outputs/flutter-apk -name 'Vibra-*.apk' | sort)
          if [ -z "$APKS" ]; then
            APKS=$(find build/app/outputs/flutter-apk -name 'app-*-release.apk' | sort)
          fi
          echo "Encontrados:"
          echo "$APKS"
          {
            echo 'paths<<EOF'
            echo "$APKS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload APKs as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibra-apks
          path: build/app/outputs/flutter-apk/Vibra-*.apk
          if-no-files-found: error

      # Crea/actualiza el GitHub Release SOLO cuando el trigger fue un tag.
      # softprops/action-gh-release adjunta los APKs al release del tag.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.paths }}
          name: Vibra ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            **¿Cuál APK descargo?** `arm64-v8a` para prácticamente
            cualquier teléfono moderno (2017+). `armeabi-v7a` solo para
            equipos viejos de 32 bits; `x86_64` para emuladores.
          generate_release_notes: true
          draft: false
          prerelease: false
