name: CI

# Chequeo rápido en cada push/PR a main: pub get + analyze + tests.
# No compila el APK (eso lo hace release.yml en tags) para que el CI
# sea veloz.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      # Tests de lógica pura (settings, auth, contraste). Rápidos — no
      # levantan emulador ni platform channels.
      - run: flutter test
