name: CI

# Chequeo rápido en cada push/PR a main: pub get + analyze.
# No compila el APK (eso lo hace release.yml en tags) para que el CI
# sea veloz.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
